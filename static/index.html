<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HStack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="app-container">
        <!-- Header -->
        <header class="user-header">
            <h1>Hi Antoine,</h1>
            <p class="subtitle">Here is your stack.</p>
        </header>

        <!-- Stack (Task List) -->
        <section class="stack-container">
            <!-- Commute Alerts Banner -->
            <div id="commute-alerts" class="commute-alerts-container"></div>

            <div id="task-list" class="task-list">
                <!-- Stacked tickets will be injected here via JS -->
            </div>
        </section>

        <!-- Action Bar Window -->
        <div class="chat-container">
            <form id="chat-form" class="chat-input-wrapper">
                <!-- Animation Container -->
                <div class="effect-container" id="effectContainer">
                    <canvas id="glCanvas"></canvas>
                    <div class="css-fallback" id="cssFallback">
                        <div class="pearl-gradient pearl-slow"></div>
                        <div class="pearl-gradient pearl-fast"></div>
                    </div>
                </div>

                <textarea id="chat-input" placeholder="Tell Gemini to manage tickets..." required autocomplete="off"></textarea>
                <button type="submit" id="chat-submit" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </form>
            <!-- AI Feedback Notification Area -->
            <div id="ai-feedback" class="ai-feedback-toast"></div>
        </div>
    </main>

    <!-- Authentication Overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">Log in to HStack</h2>
            <form id="auth-form" class="auth-box">
                <div id="register-fields" style="display: none;">
                    <input type="text" id="auth-last-name" class="auth-input" placeholder="Last Name" autocomplete="off">
                </div>
                <input type="text" id="auth-first-name" class="auth-input" placeholder="First Name" required autocomplete="off">
                <input type="password" id="auth-password" class="auth-input" placeholder="Password" required autocomplete="off">
                
                <button type="submit" class="auth-btn" id="auth-submit-btn">Login</button>
            </form>
            <div class="auth-switch">
                <span id="auth-toggle-text">Don't have an account? </span>
                <a href="#" id="auth-toggle-link">Sign up</a>
            </div>
            <div id="auth-error" class="auth-error"></div>
        </div>
    </div>

    <!-- SHADER CODE -->
    <script id="vertexShader" type="x-shader/x-vertex">
        attribute vec2 position;
        void main() {
            gl_Position = vec4(position, 0.0, 1.0);
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        precision mediump float;
        uniform float u_time;
        uniform vec2 u_resolution;

        vec3 c_base     = vec3(0.941, 0.941, 1.0); 
        vec3 c_amethyst = vec3(0.769, 0.773, 0.996); 
        vec3 c_pink     = vec3(0.980, 0.898, 0.875); 
        vec3 c_blue     = vec3(0.749, 0.804, 0.882); 
        vec3 c_white    = vec3(1.0, 1.0, 1.0);

        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

        float snoise(vec2 v) {
            const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
            vec2 i  = floor(v + dot(v, C.yy) );
            vec2 x0 = v -   i + dot(i, C.xx);
            vec2 i1;
            i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;
            i = mod289(i);
            vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
            m = m*m ;
            m = m*m ;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;
            m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
            vec3 g;
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }

        float fbm(vec2 p) {
            float f = 0.0;
            f += 0.5000 * snoise(p); p *= 2.02;
            f += 0.2500 * snoise(p); p *= 2.03;
            f += 0.1250 * snoise(p);
            return f;
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / u_resolution.xy;
            vec2 center = vec2(0.5);
            float dist = distance(uv, center);
            float friction = smoothstep(0.0, 0.65, dist); 
            vec2 st = uv * 0.25;
            friction += 0.05 * snoise(st * 3.0 + u_time * 0.1);
            float t = u_time * 0.4;
            vec2 q = vec2(0.);
            q.x = fbm(st + 0.1 * t);
            q.y = fbm(st + vec2(1.0));
            vec2 r = vec2(0.);
            float dragTime = t * (0.8 - 0.7 * friction); 
            r.x = fbm(st + 1.0 * q + vec2(1.7, 9.2) + 0.15 * dragTime);
            r.y = fbm(st + 1.0 * q + vec2(8.3, 2.8) + 0.126 * dragTime);
            float f = fbm(st + r);
            vec3 color = c_base;
            color = mix(color, c_blue, clamp(length(q), 0.0, 1.0) * 0.6);
            color = mix(color, c_amethyst, clamp(length(r.x), 0.0, 1.0));
            color = mix(color, c_pink, clamp(f, 0.0, 1.0) * 0.8);
            float highlight = smoothstep(0.4, 0.9, f);
            color = mix(color, c_white, highlight * 0.5);
            color = mix(color, c_base, smoothstep(0.85, 1.0, dist * 1.4));
            gl_FragColor = vec4(color, 1.0);
        }
    </script>
    <script src="/static/app.js"></script>
</body>
</html>
