<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Background: Deep matte charcoal with subtle gradient -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1E1F22;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0A0B0C;stop-opacity:1" />
        </linearGradient>

        <!-- Noise for matte texture -->
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" result="noise" />
            <feColorMatrix in="noise" type="saturate" values="0" result="destat" />
            <feComponentTransfer in="destat">
                <feFuncA type="linear" slope="0.04" />
            </feComponentTransfer>
            <feComposite operator="in" in2="SourceGraphic" />
        </filter>

        <!-- Sharp Top-Left Edge Hit - Increased visibility -->
        <linearGradient id="topLeftEdge" x1="0%" y1="0%" x2="40%" y2="40%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.7" />
            <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
        </linearGradient>

        <!-- Sharp Bottom-Right Edge Hit - Increased visibility -->
        <linearGradient id="bottomRightEdge" x1="100%" y1="100%" x2="60%" y2="60%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
            <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
        </linearGradient>

        <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
            <feOffset dx="0" dy="5" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Entire Icon Composition scaled and centered (macOS standard padding adjusted to 88%) -->
    <!-- Centering 88% scale: (512 - (512 * 0.88)) / 2 = 30.72 -->
    <g transform="translate(31, 31) scale(0.88)">
        <!-- Main Body Background -->
        <rect width="512" height="512" rx="113" ry="113" fill="url(#bgGradient)" />
        
        <!-- Matte Grain Layer -->
        <rect width="512" height="512" rx="113" ry="113" filter="url(#noise)" opacity="0.4" />

        <!-- Sharp Border Highlights - Slightly thicker for visibility -->
        <rect x="1" y="1" width="510" height="510" rx="112" ry="112" fill="none" stroke="url(#topLeftEdge)" stroke-width="2.0" />
        <rect x="1" y="1" width="510" height="510" rx="112" ry="112" fill="none" stroke="url(#bottomRightEdge)" stroke-width="2.0" />
        
        <!-- Subtle full outer rim -->
        <rect x="0.5" y="0.5" width="511" height="511" rx="112.5" ry="112.5" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.05" />

        <!-- Centered H Logo with gentle shadow -->
        <g transform="translate(151, 151)" fill="white" filter="url(#logoShadow)">
            <rect x="0" y="0" width="60" height="210" />
            <rect x="150" y="0" width="60" height="210" />
            <rect x="50" y="45" width="100" height="30" />
            <rect x="50" y="90" width="100" height="30" />
            <rect x="50" y="135" width="100" height="30" />
        </g>
    </g>
</svg>
